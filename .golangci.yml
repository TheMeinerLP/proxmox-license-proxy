version: "2"

run:
  timeout: 5m

linters:
  default: standard # govet, staticcheck, errcheck, ineffassign, unused
  enable:
    - gosec # crypto / exec / TLS code makes this worthwhile
    - revive
    - misspell
    - bodyclose # HTTP clients in certs/client
    - errorlint
    - gocritic
    - nolintlint # every //nolint must name the linter and carry a justification
  settings:
    # gosec runs with NO blanket excludes: every finding is either fixed or
    # justified inline with a //nolint:gosec comment at the call site. Variable
    # file paths (G304) all go through internal/fileio, which cleans the path and
    # carries the single audited suppression.
    nolintlint:
      require-explanation: true # a bare //nolint without a reason is rejected
      require-specific: true # //nolint must name the linter, e.g. //nolint:gosec
      allow-unused: false # a //nolint that suppresses nothing is rejected
    errcheck:
      exclude-functions:
        - fmt.Fprint # writes to stdout / tabwriter; the error is not actionable
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic
      # revive's exported/package-comment/unused-parameter rules are stylistic;
      # keep the rest of revive but silence those.
      - linters:
          - revive
        text: "(unused-parameter|package-comments|exported):"

formatters:
  enable:
    - gofmt
    - goimports
