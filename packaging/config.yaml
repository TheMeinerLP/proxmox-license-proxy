# /etc/pmox/config.yaml - default config for the systemd service.
# Preserved across package upgrades (marked config|noreplace).
# Any value can be overridden with a PMOX_* environment variable.

listen: ":443"
log: "info" # debug | info | warn | error

# Config, registry and the persisted auto cert all live under /etc/pmox, which
# the package makes group-writable for the service user (pmox).
registry_file: "/etc/pmox/registry.json"

tls:
  mode: "auto" # auto (self-signed) | files | http
  # cert: "/etc/pmox/tls.crt"
  # key:  "/etc/pmox/tls.key"
  names:
    - "shop.proxmox.com"

hosts:
  file: "/etc/hosts"
  names:
    - "shop.proxmox.com"

# Auto-approve hosts contacting from a trusted source IP instead of leaving them
# PENDING. An operator's BLOCKED/REJECTED decision always wins. Off by default.
auto_approve:
  enabled: false
  private: true # trust RFC1918 / ULA / loopback / link-local
  # networks:
  #   - "100.64.0.0/10"
